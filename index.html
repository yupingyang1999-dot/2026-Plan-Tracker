<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>年度計畫與文獻資料庫</title>
  <style>
    :root{--bg:#0f1117;--bg2:#181c26;--bg3:#1e2333;--border:#2e3347;--border2:#3a4060;--text:#e8eaf0;--text2:#9aa0b8;--text3:#6b7290;--primary:#5b8cff;--primary-bg:#14203f;--primary-txt:#9bb7ff;--green:#1D9E75;--green-bg:#0d2e24;--green-txt:#5DCAA5;--amber:#EF9F27;--amber-bg:#2e1e05;--amber-txt:#f3c06f;--red:#E24B4A;--red-bg:#2e0d0d;--red-txt:#ff8f8f;--purple:#9b7bff;--purple-bg:#241a43;--purple-txt:#c7b5ff;--radius-sm:10px;--shadow:0 12px 30px rgba(0,0,0,.18)}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#0f1117 0%,#111522 100%);color:var(--text);min-height:100vh;line-height:1.5;font-size:14px} a{color:var(--primary-txt);text-decoration:none} a:hover{text-decoration:underline}
    .app{max-width:1280px;margin:0 auto;padding:28px 20px 42px}.topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);font-size:20px}.title h1{font-size:22px;font-weight:700}.title p,.muted,.lit-meta,.event-note,.event-sub,.mini-item .left div{font-size:12px;color:var(--text2)}.chip{font-size:12px;padding:5px 12px;border-radius:999px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
    .main-tabs,.subject-tabs,.inline-tools,.footer-tools,.toolbar,.actions,.modal-footer{display:flex;gap:10px;flex-wrap:wrap}.main-tabs{margin:18px 0}.tab,.subject-tab,.btn{border-radius:999px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-weight:600;padding:10px 16px}.tab.active{background:var(--primary-bg);border-color:var(--primary);color:var(--primary-txt)}.subject-tab.active{background:var(--green-bg);border-color:var(--green);color:var(--green-txt)}.btn{border-radius:10px}.btn-primary{background:var(--primary);color:#fff;border:none}.btn-green{background:var(--green);color:#fff;border:none}.btn-ghost{background:transparent}.btn-danger{background:var(--red);color:#fff;border:none}
    .panel{background:rgba(24,28,38,.92);border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:var(--shadow)} .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:18px}.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:7px}.val{font-size:24px;font-weight:700}.blue{color:var(--primary-txt)}.green{color:var(--green-txt)}.amber{color:var(--amber)}.red{color:var(--red-txt)}
    input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13px;outline:none} input:focus,select:focus,textarea:focus{border-color:var(--border2)}
    .grid-head,.event-card{display:grid;grid-template-columns:1.55fr 1fr .85fr .85fr 1.15fr 120px;gap:14px;align-items:center}.grid-head,.lit-head{padding:0 10px 8px;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.6px}.event-card,.lit-row,.mini-item,.stat{border:1px solid var(--border)}.event-card{background:var(--bg2);border-radius:16px;padding:14px 16px;margin-bottom:10px}.event-title,.lit-title{font-size:14px;font-weight:700}.deadline-date{font-size:14px;font-weight:700}.deadline-rem{font-size:11px;color:var(--text3);margin-top:3px}.soon{color:var(--amber)}.urgent,.past{color:var(--red-txt)}
    .badge,.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}.importance-high{background:var(--red-bg);color:var(--red-txt)}.importance-medium{background:var(--amber-bg);color:var(--amber-txt)}.importance-low,.stage-not-started,.reading-not-started{background:var(--bg3);color:var(--text2)}.stage-preparing,.reading-notes{background:var(--purple-bg);color:var(--purple-txt)}.stage-in-progress,.reading-reading{background:var(--primary-bg);color:var(--primary-txt)}.stage-ready,.stage-done,.reading-done{background:var(--green-bg);color:var(--green-txt)}.reading-review{background:var(--amber-bg);color:var(--amber-txt)}.tag.link{background:var(--primary-bg);color:var(--primary-txt)}
    .two-col{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.mini-list{display:flex;flex-direction:column;gap:8px}.mini-item{justify-content:space-between;align-items:flex-start;padding:12px 14px;border-radius:12px;background:var(--bg2)}
    .lit-head,.lit-row{display:grid;grid-template-columns:1.4fr .8fr .8fr .7fr 1.1fr 110px;gap:12px;align-items:center}.lit-row{background:var(--bg2);border-radius:14px;padding:13px 14px;margin-bottom:10px}.footer-tools{justify-content:flex-end;margin-top:14px}
    .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:flex-start;justify-content:center;padding:28px 14px;overflow:auto;z-index:20}.modal-wrap.open{display:flex}.modal{width:760px;max-width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:22px}.modal h3{font-size:18px;margin-bottom:4px}.modal p{font-size:12px;color:var(--text3);margin-bottom:16px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-group{display:flex;flex-direction:column;gap:6px}.form-group.full{grid-column:1/-1}.form-group label{font-size:12px;color:var(--text2)} textarea{min-height:84px;resize:vertical}.empty{padding:48px 16px;text-align:center;color:var(--text3)} .icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer}
    @media(max-width:980px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.two-col{grid-template-columns:1fr}.grid-head,.event-card,.lit-head,.lit-row{grid-template-columns:1fr}.grid-head,.lit-head{display:none}.actions{justify-content:flex-start}}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar"><div class="logo">🗂️</div><div class="title"><h1>年度計畫與文獻資料庫</h1><p>給自己用的進度總表，可追蹤重要事件、準備階段與平時閱讀筆記</p></div><span class="chip" id="todayChip"></span></div>
  <div class="main-tabs"><button class="tab active" data-view="plans">年度計畫</button><button class="tab" data-view="literature">文獻資料庫</button></div>
  <div id="plansView"><div class="stats" id="planStats"></div><div class="panel"><div class="toolbar"><input id="planSearch" placeholder="搜尋事件名稱、備註、文件..." style="width:220px" /><select id="planYearFilter"></select><select id="planStageFilter"><option value="">全部準備階段</option><option value="not-started">未開始</option><option value="preparing">準備中</option><option value="in-progress">執行中</option><option value="ready">已準備好</option><option value="done">已完成</option></select><select id="planImportanceFilter"><option value="">全部重要度</option><option value="high">高</option><option value="medium">中</option><option value="low">低</option></select><button class="btn btn-primary" id="addPlanBtn">+ 新增事件</button></div><div class="grid-head"><span>事件</span><span>日期</span><span>重要度</span><span>準備</span><span>文件 / 官方資料</span><span></span></div><div id="planList"></div></div><div class="two-col" style="margin-top:18px;"><div class="panel"><div class="mini-list" id="upcomingList"></div></div><div class="panel"><div class="mini-list" id="yearSummary"></div></div></div></div>
  <div id="literatureView" style="display:none;"><div class="panel"><div class="inline-tools"><button class="btn btn-green" id="addSubjectBtn">+ 新增科目分頁</button><button class="btn btn-primary" id="addLitBtn">+ 新增文獻</button></div><div class="subject-tabs" id="subjectTabs"></div><div class="toolbar"><input id="litSearch" placeholder="搜尋標題、作者、摘要、關鍵字..." style="width:240px" /><select id="litStatusFilter"><option value="">全部閱讀狀態</option><option value="not-started">未開始</option><option value="reading">閱讀中</option><option value="notes">整理筆記中</option><option value="done">已讀完</option><option value="review">待複習</option></select></div><div class="lit-head"><span>文獻</span><span>作者 / 年份</span><span>類型</span><span>狀態</span><span>連結 / 摘要</span><span></span></div><div id="litList"></div></div></div>
  <div class="footer-tools"><button class="btn btn-ghost" id="exportBtn">匯出備份</button><label class="btn btn-ghost" for="importFile">匯入備份</label><input type="file" id="importFile" accept="application/json" hidden /><button class="btn btn-danger" id="resetBtn">重設範例資料</button></div>
</div>
<div class="modal-wrap" id="planModalWrap"><div class="modal"><h3 id="planModalTitle">新增事件</h3><p>適合填報名日期、檢定、考試、申請截止日、交件日等任何你要追蹤的節點。</p><div class="form-grid"><div class="form-group full"><label>事件名稱</label><input id="planTitle" placeholder="例如：5/15 B1 法文檢定" /></div><div class="form-group"><label>日期</label><input id="planDate" type="date" /></div><div class="form-group"><label>年份分類</label><input id="planYear" placeholder="例如：2026" /></div><div class="form-group"><label>重要度</label><select id="planImportance"><option value="high">高</option><option value="medium">中</option><option value="low">低</option></select></div><div class="form-group"><label>準備階段</label><select id="planStage"><option value="not-started">未開始</option><option value="preparing">準備中</option><option value="in-progress">執行中</option><option value="ready">已準備好</option><option value="done">已完成</option></select></div><div class="form-group full"><label>準備事項</label><input id="planPrep" placeholder="例如：完成報名表、準備口說、複習歷屆題目" /></div><div class="form-group full"><label>文件</label><input id="planDocs" placeholder="例如：報名表、身分證、繳費證明、准考證" /></div><div class="form-group full"><label>官方資料連結</label><input id="planOfficial" placeholder="https://..." /></div><div class="form-group full"><label>備註</label><textarea id="planNote" placeholder="任何提醒、注意事項、個人規劃都可以寫"></textarea></div></div><div class="modal-footer"><button class="btn btn-ghost" id="cancelPlanBtn">取消</button><button class="btn btn-primary" id="savePlanBtn">儲存</button></div></div></div>
<div class="modal-wrap" id="subjectModalWrap"><div class="modal" style="width:480px;"><h3>新增科目分頁</h3><p>例如：國際關係理論、研究方法、國際法、法文課。</p><div class="form-group"><label>科目名稱</label><input id="subjectName" placeholder="輸入科目名稱" /></div><div class="modal-footer"><button class="btn btn-ghost" id="cancelSubjectBtn">取消</button><button class="btn btn-green" id="saveSubjectBtn">儲存</button></div></div></div>
<div class="modal-wrap" id="litModalWrap"><div class="modal"><h3 id="litModalTitle">新增文獻</h3><p>可按科目整理每篇文章、書章或課堂閱讀，補上摘要與自己的筆記進度。</p><div class="form-grid"><div class="form-group full"><label>標題</label><input id="litTitle" placeholder="文獻標題" /></div><div class="form-group"><label>科目</label><select id="litSubject"></select></div><div class="form-group"><label>作者 / 年份</label><input id="litAuthor" placeholder="例如：Wendt, 1992" /></div><div class="form-group"><label>類型</label><select id="litType"><option>期刊文章</option><option>書籍章節</option><option>書籍</option><option>課堂講義</option><option>報告</option><option>其他</option></select></div><div class="form-group"><label>閱讀狀態</label><select id="litStatus"><option value="not-started">未開始</option><option value="reading">閱讀中</option><option value="notes">整理筆記中</option><option value="done">已讀完</option><option value="review">待複習</option></select></div><div class="form-group full"><label>官方或檔案連結</label><input id="litLink" placeholder="https://..." /></div><div class="form-group full"><label>關鍵字</label><input id="litKeywords" placeholder="例如：constructivism, norms, compliance" /></div><div class="form-group full"><label>摘要 / 筆記</label><textarea id="litSummary" placeholder="可寫核心論點、研究方法、你的心得"></textarea></div></div><div class="modal-footer"><button class="btn btn-ghost" id="cancelLitBtn">取消</button><button class="btn btn-primary" id="saveLitBtn">儲存</button></div></div></div>
<script>
const STORAGE_KEY='annualPlannerDashboard_v1'; const el=id=>document.getElementById(id); const clone=o=>JSON.parse(JSON.stringify(o)); function rid(){return 'id-'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
const defaults={plans:[{id:rid(),title:'青年百億計畫報名',date:'2026-03-31',year:'2026',importance:'high',stage:'in-progress',prep:'確認申請資料、動機與後續規劃內容',docs:'報名資料、申請文件、個人陳述',official:'',note:'確認截止時間與上傳格式。'},{id:rid(),title:'B1 法文檢定',date:'2026-05-15',year:'2026',importance:'high',stage:'preparing',prep:'口說練習、文法複習、模擬題',docs:'准考證、身分證件、報名確認',official:'',note:'可另外安排每週模擬測驗。'},{id:rid(),title:'外交特考',date:'2026-09-05',year:'2026',importance:'high',stage:'not-started',prep:'建立讀書計畫、蒐集考科資料',docs:'報名資訊、考試簡章、應試用品',official:'',note:'之後可再拆成報名、筆試、口試等子事件。'}],subjects:['全部','國際關係理論','研究方法'],activeSubject:'全部',literature:[{id:rid(),title:'Social Theory of International Politics',author:'Wendt, 1999',subject:'國際關係理論',type:'書籍',status:'reading',link:'',keywords:'constructivism, identity, anarchy',summary:'整理重點章節與核心概念。'},{id:rid(),title:'The SAGE Handbook of Text as Data',author:'Various Authors',subject:'研究方法',type:'書籍章節',status:'notes',link:'',keywords:'text as data, methodology',summary:'可分章節整理研究設計與方法應用。'}]};
let state=load(), currentView='plans', editingPlanId=null, editingLitId=null;
function load(){try{const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return clone(defaults); const p=JSON.parse(raw); if(!p.subjects||!p.subjects.length) p.subjects=['全部']; if(!p.subjects.includes('全部')) p.subjects.unshift('全部'); if(!p.activeSubject) p.activeSubject='全部'; return p}catch{return clone(defaults)}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); render()} function fmt(d){if(!d)return '—'; const x=new Date(d+'T00:00:00'); return `${x.getFullYear()}/${String(x.getMonth()+1).padStart(2,'0')}/${String(x.getDate()).padStart(2,'0')}`}
function daysUntil(d){if(!d)return null; const t=new Date(d+'T00:00:00'); const n=new Date(); n.setHours(0,0,0,0); return Math.round((t-n)/86400000)} function dlabel(d){const x=daysUntil(d); if(x===null)return {text:'未設定',cls:''}; if(x<0)return {text:`已過 ${Math.abs(x)} 天`,cls:'past'}; if(x===0)return {text:'今天',cls:'urgent'}; if(x<=7)return {text:`還有 ${x} 天`,cls:'urgent'}; if(x<=30)return {text:`還有 ${x} 天`,cls:'soon'}; return {text:`還有 ${x} 天`,cls:''}}
const imp=v=>v==='high'?'高':v==='medium'?'中':'低', stage=v=>({'not-started':'未開始','preparing':'準備中','in-progress':'執行中','ready':'已準備好','done':'已完成'})[v]||'未開始', read=v=>({'not-started':'未開始','reading':'閱讀中','notes':'整理筆記中','done':'已讀完','review':'待複習'})[v]||'未開始';
function years(){const y=[...new Set(state.plans.map(p=>p.year||(p.date?String(new Date(p.date).getFullYear()):'未分類')))].filter(Boolean); y.sort(); return ['全部年份',...y]}
function renderStats(){const p=state.plans, due30=p.filter(i=>{const d=daysUntil(i.date); return d!==null&&d>=0&&d<=30}).length, high=p.filter(i=>i.importance==='high').length, done=p.filter(i=>i.stage==='done').length, prog=p.filter(i=>['preparing','in-progress','ready'].includes(i.stage)).length; el('planStats').innerHTML=[['事件總數',p.length,''],['高重要度',high,'red'],['30 天內',due30,'amber'],['進行 / 準備中',prog,'blue'],['已完成',done,'green']].map(([l,v,c])=>`<div class="stat"><div class="lbl">${l}</div><div class="val ${c}">${v}</div></div>`).join('')}
function renderYearFilter(){const s=el('planYearFilter'), cur=s.value||'全部年份', ys=years(); s.innerHTML=ys.map(y=>`<option value="${y}">${y}</option>`).join(''); s.value=ys.includes(cur)?cur:'全部年份'}
function planRows(){const q=el('planSearch').value.trim().toLowerCase(), y=el('planYearFilter').value, st=el('planStageFilter').value, im=el('planImportanceFilter').value; return [...state.plans].filter(p=>!q||[p.title,p.prep,p.docs,p.note,p.official].join(' ').toLowerCase().includes(q)).filter(p=>y==='全部年份'||(p.year||'')===y).filter(p=>!st||p.stage===st).filter(p=>!im||p.importance===im).sort((a,b)=>(a.date||'9999-12-31').localeCompare(b.date||'9999-12-31'))}
function renderPlans(){renderStats(); renderYearFilter(); const rows=planRows(); el('planList').innerHTML=rows.length?rows.map(p=>{const d=dlabel(p.date), off=p.official?`<a class="tag link" href="${p.official}" target="_blank">官方資料</a>`:'<span class="docs-pill">無連結</span>'; return `<div class="event-card"><div><div class="event-title">${p.title}</div><div class="event-sub">準備：${p.prep||'—'}</div><div class="event-note">${p.note||'—'}</div></div><div><div class="deadline-date">${fmt(p.date)}</div><div class="deadline-rem ${d.cls}">${d.text}</div></div><div><span class="badge importance-${p.importance}">${imp(p.importance)}</span></div><div><span class="badge stage-${p.stage}">${stage(p.stage)}</span></div><div><div class="docs-pill">文件：${p.docs||'—'}</div><div style="margin-top:6px;">${off}</div></div><div class="actions"><button class="icon-btn" onclick="openPlanModal('${p.id}')">✎</button><button class="icon-btn" onclick="deletePlan('${p.id}')">✕</button></div></div>`}).join(''):'<div class="empty">目前沒有符合條件的事件。</div>';
const up=[...state.plans].filter(p=>{const d=daysUntil(p.date); return d!==null&&d>=0&&d<=30}).sort((a,b)=>a.date.localeCompare(b.date)); el('upcomingList').innerHTML=up.length?up.map(p=>{const d=dlabel(p.date); return `<div class="mini-item"><div class="left"><strong>${p.title}</strong><div>${fmt(p.date)} · ${stage(p.stage)}</div></div><span class="badge importance-${p.importance}">${d.text}</span></div>`}).join(''):'<div class="empty">目前 30 天內沒有事件。</div>';
const ys=years().filter(x=>x!=='全部年份'); el('yearSummary').innerHTML=ys.length?ys.map(y=>{const items=state.plans.filter(p=>(p.year||'')===y); return `<div class="mini-item"><div class="left"><strong>${y}</strong><div>${items.map(i=>i.title).slice(0,2).join('、')||'無事件'}${items.length>2?'…':''}</div></div><span class="badge stage-in-progress">${items.length} 項</span></div>`}).join(''):'<div class="empty">尚未建立年份分類。</div>'}
function renderSubjects(){el('subjectTabs').innerHTML=state.subjects.map(s=>`<button class="subject-tab ${state.activeSubject===s?'active':''}" onclick="setActiveSubject('${String(s).replaceAll("'","\\'")}')">${s}</button>`).join(''); el('litSubject').innerHTML=state.subjects.filter(s=>s!=='全部').map(s=>`<option value="${s}">${s}</option>`).join('')}
function litRows(){const q=el('litSearch').value.trim().toLowerCase(), st=el('litStatusFilter').value; return state.literature.filter(i=>state.activeSubject==='全部'||i.subject===state.activeSubject).filter(i=>!st||i.status===st).filter(i=>!q||[i.title,i.author,i.keywords,i.summary,i.link].join(' ').toLowerCase().includes(q))}
function renderLit(){renderSubjects(); const rows=litRows(); el('litList').innerHTML=rows.length?rows.map(i=>`<div class="lit-row"><div><div class="lit-title">${i.title}</div><div class="lit-meta">${i.keywords||'無關鍵字'}</div></div><div>${i.author||'—'}</div><div>${i.type||'—'}</div><div><span class="badge reading-${i.status}">${read(i.status)}</span></div><div><div>${i.link?`<a href="${i.link}" target="_blank">連結</a>`:'—'}</div><div class="lit-meta">${i.summary||'—'}</div></div><div class="actions"><button class="icon-btn" onclick="openLitModal('${i.id}')">✎</button><button class="icon-btn" onclick="deleteLit('${i.id}')">✕</button></div></div>`).join(''):'<div class="empty">目前沒有符合條件的文獻。</div>'}
function render(){el('todayChip').textContent=`今天：${fmt(new Date().toISOString().slice(0,10))}`; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===currentView)); el('plansView').style.display=currentView==='plans'?'':'none'; el('literatureView').style.display=currentView==='literature'?'':'none'; renderPlans(); renderLit()}
function openPlanModal(id=null){editingPlanId=id; const p=state.plans.find(x=>x.id===id); el('planModalTitle').textContent=id?'編輯事件':'新增事件'; el('planTitle').value=p?.title||''; el('planDate').value=p?.date||''; el('planYear').value=p?.year||''; el('planImportance').value=p?.importance||'medium'; el('planStage').value=p?.stage||'not-started'; el('planPrep').value=p?.prep||''; el('planDocs').value=p?.docs||''; el('planOfficial').value=p?.official||''; el('planNote').value=p?.note||''; el('planModalWrap').classList.add('open')} function closePlanModal(){el('planModalWrap').classList.remove('open')}
function savePlan(){const p={id:editingPlanId||rid(),title:el('planTitle').value.trim()||'未命名事件',date:el('planDate').value,year:el('planYear').value.trim()||(el('planDate').value?String(new Date(el('planDate').value).getFullYear()):'未分類'),importance:el('planImportance').value,stage:el('planStage').value,prep:el('planPrep').value.trim(),docs:el('planDocs').value.trim(),official:el('planOfficial').value.trim(),note:el('planNote').value.trim()}; state.plans=editingPlanId?state.plans.map(x=>x.id===editingPlanId?p:x):[...state.plans,p]; closePlanModal(); save()}
function deletePlan(id){const p=state.plans.find(x=>x.id===id); if(p&&confirm(`確定刪除「${p.title}」？`)){state.plans=state.plans.filter(x=>x.id!==id); save()}}
function openSubjectModal(){el('subjectName').value=''; el('subjectModalWrap').classList.add('open')} function closeSubjectModal(){el('subjectModalWrap').classList.remove('open')} function saveSubject(){const n=el('subjectName').value.trim(); if(!n)return; if(state.subjects.includes(n)) return alert('這個科目已存在。'); state.subjects.push(n); state.activeSubject=n; closeSubjectModal(); save()} function setActiveSubject(s){state.activeSubject=s; save()}
function openLitModal(id=null){if(state.subjects.filter(s=>s!=='全部').length===0) return alert('請先新增至少一個科目分頁。'); editingLitId=id; renderSubjects(); const i=state.literature.find(x=>x.id===id); el('litModalTitle').textContent=id?'編輯文獻':'新增文獻'; el('litTitle').value=i?.title||''; el('litSubject').value=i?.subject||state.subjects.find(s=>s!=='全部')||''; el('litAuthor').value=i?.author||''; el('litType').value=i?.type||'期刊文章'; el('litStatus').value=i?.status||'not-started'; el('litLink').value=i?.link||''; el('litKeywords').value=i?.keywords||''; el('litSummary').value=i?.summary||''; el('litModalWrap').classList.add('open')}
function closeLitModal(){el('litModalWrap').classList.remove('open')} function saveLit(){const i={id:editingLitId||rid(),title:el('litTitle').value.trim()||'未命名文獻',subject:el('litSubject').value,author:el('litAuthor').value.trim(),type:el('litType').value,status:el('litStatus').value,link:el('litLink').value.trim(),keywords:el('litKeywords').value.trim(),summary:el('litSummary').value.trim()}; state.literature=editingLitId?state.literature.map(x=>x.id===editingLitId?i:x):[...state.literature,i]; closeLitModal(); save()}
function deleteLit(id){const i=state.literature.find(x=>x.id===id); if(i&&confirm(`確定刪除「${i.title}」？`)){state.literature=state.literature.filter(x=>x.id!==id); save()}}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}), url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download='annual-planner-backup.json'; a.click(); URL.revokeObjectURL(url)}
function importData(file){const r=new FileReader(); r.onload=e=>{try{const p=JSON.parse(e.target.result); if(!p.plans||!p.subjects||!p.literature) throw new Error(); state=p; if(!state.subjects.includes('全部')) state.subjects.unshift('全部'); if(!state.activeSubject) state.activeSubject='全部'; save()}catch{alert('匯入失敗，請確認 JSON 格式。')}}; r.readAsText(file)}
function resetData(){if(confirm('要重設成範例資料嗎？目前資料會被覆蓋。')){state=clone(defaults); save()}}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{currentView=b.dataset.view; render()})); ['planSearch','planStageFilter','planImportanceFilter','planYearFilter'].forEach(id=>el(id).addEventListener('input',renderPlans)); ['planYearFilter','planStageFilter','planImportanceFilter','litStatusFilter'].forEach(id=>el(id).addEventListener('change',id==='litStatusFilter'?renderLit:renderPlans)); el('litSearch').addEventListener('input',renderLit); el('addPlanBtn').addEventListener('click',()=>openPlanModal()); el('cancelPlanBtn').addEventListener('click',closePlanModal); el('savePlanBtn').addEventListener('click',savePlan); el('addSubjectBtn').addEventListener('click',openSubjectModal); el('cancelSubjectBtn').addEventListener('click',closeSubjectModal); el('saveSubjectBtn').addEventListener('click',saveSubject); el('addLitBtn').addEventListener('click',()=>openLitModal()); el('cancelLitBtn').addEventListener('click',closeLitModal); el('saveLitBtn').addEventListener('click',saveLit); el('exportBtn').addEventListener('click',exportData); el('importFile').addEventListener('change',e=>{if(e.target.files[0]) importData(e.target.files[0]); e.target.value=''}); el('resetBtn').addEventListener('click',resetData); ['planModalWrap','subjectModalWrap','litModalWrap'].forEach(id=>el(id).addEventListener('click',e=>{if(e.target.id===id) e.target.classList.remove('open')}));
window.openPlanModal=openPlanModal; window.deletePlan=deletePlan; window.openLitModal=openLitModal; window.deleteLit=deleteLit; window.setActiveSubject=setActiveSubject; render();
</script>
</body>
</html>
